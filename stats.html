<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement IITK 2025</title>
<style>
    body {
        font-family: 'Arial', sans-serif;
        margin: 20px;
        /* margin-top: 0; */
        padding: 20px;
        background: #fff9e4;
        color: #333;
    }
    nav {
        background-color: #333;
        color: white;
        padding: 10px;
        text-align: center;
        position: fixed; /* Fixes the nav bar to the top of the viewport */
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000; 
    }
    nav a {
        color: white;
        margin: 20px;
        text-decoration: none;
        font-weight: bold;
    }
    h1 {
        text-align: center;
        margin-bottom: 20px;
    }
    .scrollable-table {
        height: 85vh; /* Adjust based on your needs */
        overflow-y: auto;
        border: 1px solid #ddd;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
    }
    th, td {
        padding: 8px;
        border: 1px solid #ddd;
        text-align: left;
        font-size: 14px;
        background: #FFF; /* Ensure background is not transparent */
    }
    th {
        position: sticky;
        top: 0; /* Set top to 0 so headers stick at the top of the scrollable area */
        background-color: #333;
        color: white;
        font-size: 16px;
    }
    tr:nth-child(even) {
        background-color: #f8f8f8;
    }
    tr:hover {
        background-color: #f1f1f1;
    }
    a {
        color: #007BFF;
        text-decoration: none;
    }
    a:hover {
        text-decoration: underline;
    }
</style>
<nav>
    <a href="index.html">PROFORMA</a>
    <a href="stats.html">STATS</a>
</nav>
</head>

<body>
    
<h1>IITK 2025 Placement Stats</h1>

<div class="scrollable-table">
    <table id="companyTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll No.</th>
                <th>Company Name</th>
                <th>Profile</th>
                <th>Branch</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

<script>
function loadCompanies() {
    fetch('stats.json')
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(data => {
        const tableBody = document.getElementById('companyTable').getElementsByTagName('tbody')[0];
        tableBody.innerHTML = ''; // Clear the table body
        data.forEach((company, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `<td>${company["name"]}</td>
                            <td>${company["roll_no"]}</td>
                            <td>${company["company_name"]}</td>
                             <td>${company["profile"]}</td>  
                             <td>${company["program_department"]}</td>
                             `;
            tableBody.appendChild(row);
        });
    })
    .catch(error => {
        console.error('Error loading the data:', error);
        alert('Failed to load data: ' + error.message);
    });
}

window.onload = loadCompanies;
</script>
</body>
</html>
